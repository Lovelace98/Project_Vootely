<div class="overflow-x-auto border border-gray-100/80 dark:border-vc-dark-600 rounded-2xl shadow-sm">
    <table class="min-w-[600px] w-full text-left border-collapse">
        <thead>
            <tr class="bg-vc-blue-50/50 dark:bg-slate-800/50 border-y border-gray-100 dark:border-vc-dark-600">
                <th class="py-3 px-6 text-xs font-bold uppercase tracking-wider text-vc-blue dark:text-vc-blue-200 whitespace-nowrap">Nominee Name</th>
                <th class="py-3 px-6 text-xs font-bold uppercase tracking-wider text-vc-blue dark:text-vc-blue-200 whitespace-nowrap">Event</th>
                <th class="py-3 px-6 text-xs font-bold uppercase tracking-wider text-vc-blue dark:text-vc-blue-200 whitespace-nowrap">Votes received</th>
                <th class="py-3 px-6 text-xs font-bold uppercase tracking-wider text-vc-blue dark:text-vc-blue-200 whitespace-nowrap">Gross revenue</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-100 dark:divide-vc-dark-600">
            {% for nominee in nominees_perf %}
                <tr class="hover:bg-gray-50/50 dark:hover:bg-vc-dark-50/50 transition-colors">
                    <td class="py-4 px-6 text-sm font-bold text-vc-dark dark:text-white whitespace-nowrap">{{ nominee.name }}</td>
                    <td class="py-4 px-6 text-xs font-semibold text-vc-dark-400 dark:text-slate-400 whitespace-nowrap">{{ nominee.event.title }}</td>
                    <td class="py-4 px-6 text-xs font-extrabold text-vc-dark dark:text-slate-200 whitespace-nowrap">{{ nominee.votes }} votes</td>
                    <td class="py-4 px-6 text-sm font-extrabold text-emerald-600 whitespace-nowrap">{{ default_currency }} {{ nominee.earnings|floatformat:2 }}</td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="4" class="py-12 text-center text-xs font-semibold text-vc-dark-400 dark:text-slate-400">
                        No active nominee records found matching filters.
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
