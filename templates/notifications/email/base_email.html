<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block email_title %}Vootely{% endblock %}</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f6f9fc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
        }
        table {
            border-collapse: collapse;
        }
        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #f6f9fc;
            padding-bottom: 40px;
        }
        .main {
            background-color: #ffffff;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            border-collapse: collapse;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
        }
        .header {
            background-color: #191bdf;
            padding: 32px 32px;
            text-align: center;
        }
        .logo-text {
            color: #ffffff;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin: 0;
            display: inline-block;
        }
        .logo-orange {
            color: #f97316;
        }
        .content {
            padding: 40px 32px;
            line-height: 1.6;
            font-size: 15px;
            color: #334155;
        }
        .footer {
            padding: 24px 32px;
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            background-color: #f8fafc;
            border-top: 1px solid #f1f5f9;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            background-color: #f97316;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            margin: 24px 0;
            box-shadow: 0 4px 6px rgba(249, 115, 22, 0.2);
            text-align: center;
        }
        .btn-blue {
            background-color: #2563eb;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
        }
        .h1 {
            color: #0f172a;
            font-size: 22px;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 16px;
        }
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 700;
            background-color: #eff6ff;
            color: #1d4ed8;
            margin-bottom: 16px;
        }
        .card {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }
        .meta-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.05em;
            margin: 0 0 4px 0;
        }
        .meta-val {
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
            margin: 0;
        }
        .meta-row {
            margin-bottom: 12px;
        }
        .meta-row:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <table class="wrapper" width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center" style="padding: 40px 10px;">
                <table class="main" width="100%" cellpadding="0" cellspacing="0">
                    <!-- Header -->
                    <tr>
                        <td class="header" align="center" style="background-color: #191bdf; padding: 32px 32px;">
                            <img src="https://i.imgur.com/1dvgMRx.png" alt="Vootely" height="40" style="border: 0; outline: none; text-decoration: none; display: block; margin: 0 auto;">
                        </td>
                    </tr>
                    <!-- Content -->
                    <tr>
                        <td class="content">
                            {% block email_content %}{% endblock %}
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td class="footer">
                            <p style="margin: 0 0 8px 0;">This is a system transaction notification sent by Vootely.</p>
                            <p style="margin: 0 0 8px 0;">Need help? Contact us at <a href="mailto:{{ support_email }}" style="color: #3b82f6; text-decoration: none;">{{ support_email }}</a> or call <a href="tel:{{ support_phone|cut:' ' }}" style="color: #3b82f6; text-decoration: none;">{{ support_phone }}</a></p>
                            <p style="margin: 0;">&copy; 2026 Vootely. All rights reserved.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
