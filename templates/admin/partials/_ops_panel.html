<article class="vc-panel">
    <h2>{{ title }}</h2>
    {% if items %}
        <ul class="vc-list">
            {% for item in items %}
                <li>
                    <a class="vc-row" href="{{ item.url }}">
                        <span class="vc-row-main">
                            <span class="vc-row-label">{{ item.label }}</span>
                            <span class="vc-row-desc">{{ item.description }}</span>
                        </span>
                        <span class="vc-pill">{{ item.status }}</span>
                    </a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <div class="vc-empty">No items need attention.</div>
    {% endif %}
</article>
